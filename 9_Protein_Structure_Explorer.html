<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Structure Explorer v5.1 | Bio-Edu Suite</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f3f4; color: #2c3e50; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .header-container { width: 100%; background: #1a252f; border-bottom: 4px solid #1abc9c; display: flex; justify-content: center; z-index: 10; }
        .header { width: 100%; max-width: 1200px; padding: 15px 20px; color: white; position: relative; }
        .header h1 { margin: 0; font-size: 20px; font-weight: 700; }
        .header p { margin: 4px 0 0 0; font-size: 11px; color: #1abc9c; }
        .version-badge { position: absolute; right: 20px; top: 15px; background: #34495e; color: #1abc9c; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #1abc9c; }

        .main-content { width: 100%; max-width: 1200px; padding: 20px; display: grid; grid-template-columns: 380px 1fr; gap: 20px; align-items: start; flex: 1; }

        .control-panel { display: flex; flex-direction: column; gap: 12px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border-top: 4px solid #3498db; }
        .card-header { background: #34495e; color: white; padding: 10px 15px; font-size: 13px; font-weight: bold; }
        .card-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

        .step-label { font-size: 11px; font-weight: 800; color: #e67e22; margin-bottom: 2px; }
        .input-group { display: flex; gap: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 13px; font-family: monospace; font-weight: bold; outline: none; }

        .btn { background: #fdfefe; border: 1px solid #bdc3c7; padding: 8px; cursor: pointer; font-size: 11px; border-radius: 4px; font-weight: bold; color: #2c3e50; transition: 0.2s; text-align: center; }
        .btn:hover { background: #eaf2f8; border-color: #3498db; }
        .btn-primary { background: #3498db; color: white; border: none; }
        .btn-success { background: #27ae60; color: white; border: none; }
        .btn-sync { background: #f39c12; color: white; border: none; }

        .viewer-card { border-top-color: #9b59b6; height: 650px; display: flex; flex-direction: column; position: sticky; top: 20px; }
        #gldiv { width: 100%; flex: 1; background: #0b0b0b; position: relative; }
        
        .viewer-controls { background: #2c3e50; padding: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; }
        .viewer-controls .btn { background: #34495e; color: white; border: 1px solid #1abc9c; }

        .status-bar { background: #2c3e50; color: white; padding: 8px 20px; font-size: 12px; width: 100%; margin-top: auto; border-top: 1px solid #1abc9c; display: flex; justify-content: space-between; }

        /* スマホ・タブレット用レイアウト */
        @media screen and (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; padding: 10px; }
            .viewer-card { height: 500px; position: static; }
        }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header">
        <h1>🧬 Protein Structure Explorer</h1>
        <p>Bio-Edu Suite: High-Resolution Structural Mapping</p>
        <div class="version-badge">v5.1</div>
    </div>
</div>

<div class="main-content">
    <div class="control-panel">
        <div class="card">
            <div class="card-header">⚙️ 1. データ取得・複合体作成</div>
            <div class="card-body">
                <button class="btn btn-sync" onclick="syncWithAlignment()">🧬 アプリ④から変異を同期</button>
                <div class="step-label" style="margin-top:5px;">PDB構造の読込</div>
                <div class="input-group">
                    <input type="text" id="pdbId" value="2hhb" placeholder="PDB ID (例: 2HHB)">
                    <button class="btn btn-primary" onclick="loadPDB(false)">新規読込</button>
                    <button class="btn" style="background:#f1c40f;" onclick="loadPDB(true)">追加(結合)</button>
                </div>
                <div class="step-label" style="margin-top:5px;">AlphaFold予測の取得</div>
                <div class="input-group">
                    <input type="text" id="uniprotId" value="P68871" placeholder="Uniprot ID">
                    <button class="btn btn-success" onclick="loadAlphaFold()">AF取得</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">📍 2. 部位ハイライト</div>
            <div class="card-body">
                <div class="input-group">
                    <input type="text" id="residueList" value="6" placeholder="残基番号: 6, 25...">
                    <button class="btn" onclick="highlightResidues()">光らせる</button>
                </div>
                <button class="btn" style="background:#8e44ad; color:white; margin-top:5px;" onclick="highlightLigands()">💊 結合小分子(Ligands) を強調</button>
                <button class="btn" style="background:#2980b9; color:white;" onclick="highlightDNA()">🧬 核酸(Nucleic Acids) を強調</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">🎨 3. 表示切替・出力</div>
            <div class="card-body">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <button class="btn" onclick="setStyle('chain')">ユニット別表示</button>
                    <button class="btn" onclick="setStyle('cartoon')">リボン</button>
                    <button class="btn" onclick="setStyle('surface')">表面電荷</button>
                    <button class="btn" onclick="setStyle('sphere')">空間充填</button>
                </div>
                <button class="btn" style="margin-top:5px; background:#ecf0f1; border-color:#bdc3c7;" onclick="exportImageModal()">📸 PNG画像を保存</button>
            </div>
        </div>
    </div>

    <div class="card viewer-card">
        <div class="card-header" style="background:#8e44ad; display:flex; justify-content:space-between;">
            <span>🧬 3D Protein Viewer</span>
            <span id="dataInfo" style="font-family:monospace; font-size:11px;">READY</span>
        </div>
        <div id="gldiv"></div>
        <div class="viewer-controls">
            <button class="btn" onclick="resetView()">🔄 視点リセット</button>
            <button class="btn" id="spinBtn" onclick="toggleSpin()">🔄 自動回転 ON</button>
            <button class="btn" onclick="viewer.clearLabels(); viewer.render();">🏷️ ラベル消去</button>
        </div>
    </div>
</div>

<div class="status-bar"><span id="statusText">READY: PDB IDを入力して開始してください。</span></div>

<script>
    let viewer = null;
    let isSpinning = false;

    document.addEventListener("DOMContentLoaded", function() {
        viewer = $3Dmol.createViewer("gldiv", { defaultcolors: $3Dmol.rasmolElementColors });
        loadPDB(false); 
    });

    function loadPDB(append) {
        const id = document.getElementById('pdbId').value.trim().toLowerCase();
        if(!id) return;
        if(!append) viewer.clear();
        
        document.getElementById('statusText').innerText = `PDB [${id}] を読込中...`;
        $3Dmol.download("pdb:" + id, viewer, {multimodel: true, frames: true}, function() {
            viewer.setStyle({}, {cartoon: {colorscheme: 'chain'}}); 
            viewer.zoomTo();
            viewer.render();
            document.getElementById('dataInfo').innerText = `LOADED: ${id.toUpperCase()}`;
            document.getElementById('statusText').innerText = append ? "構造を追加しました。" : "構造を新規読込しました。";
        });
    }

    function loadAlphaFold() {
        const id = document.getElementById('uniprotId').value.trim().toUpperCase();
        if(!id) return;
        viewer.clear();
        const url = `https://alphafold.ebi.ac.uk/files/AF-${id}-F1-model_v4.pdb`;
        fetch(url).then(res => res.text()).then(data => {
            viewer.addModel(data, "pdb");
            viewer.setStyle({}, {cartoon: {colorscheme: 'plddt'}}); 
            viewer.zoomTo();
            viewer.render();
            document.getElementById('statusText').innerText = "AlphaFold予測データを読み込みました。";
        });
    }

    function setStyle(style) {
        viewer.removeAllSurfaces(); 
        viewer.setStyle({}, {}); 

        if(style === 'chain') viewer.setStyle({}, {cartoon: {colorscheme: 'chain'}});
        else if(style === 'cartoon') viewer.setStyle({}, {cartoon: {color: 'spectrum'}});
        else if(style === 'sphere') viewer.setStyle({}, {sphere: {}});
        else if(style === 'stick') viewer.setStyle({}, {stick: {radius: 0.2}});
        else if(style === 'surface') {
            viewer.setStyle({}, {cartoon: {opacity:0.2}});
            viewer.addSurface($3Dmol.SurfaceType.VDW, {opacity: 0.8, colorscheme: 'whiteCarbon'}, {}, {});
        }
        viewer.render();
    }

    function highlightResidues() {
        const input = document.getElementById('residueList').value;
        const resIndices = input.split(',').map(n => parseInt(n.trim()));
        viewer.setStyle({}, {cartoon: {color: 'lightgrey', opacity: 0.3}});
        resIndices.forEach(num => {
            if(!isNaN(num)) {
                viewer.addStyle({resi: num}, {stick: {color: 'red', radius: 0.5}, sphere: {scale: 0.8, color: 'red'}});
                viewer.addLabel(`Res:${num}`, {position: {resi: num}, backgroundColor: 'red', fontColor: 'white'});
            }
        });
        viewer.render();
    }

    function highlightLigands() {
        viewer.addStyle({hetres: true}, {stick: {colorscheme: 'greenCarbon', radius: 0.3}, sphere: {scale:0.5}});
        viewer.render();
    }

    function highlightDNA() {
        viewer.setStyle({nucleic: true}, {stick: {colorscheme: 'cyanCarbon', radius: 0.4}, cartoon: {color: 'cyan'}});
        viewer.render();
    }

    // 🚨 修正: 確実に動作するリセットと回転
    function resetView() { 
        viewer.zoomTo(); 
        viewer.render(); 
    }
    
    function toggleSpin() {
        isSpinning = !isSpinning;
        if(isSpinning) {
            viewer.spin("y", 1); // Y軸方向に確実にスピンさせる
            document.getElementById('spinBtn').innerText = "🔄 自動回転 OFF";
        } else {
            viewer.spin(false); // スピンを停止する
            document.getElementById('spinBtn').innerText = "🔄 自動回転 ON";
        }
    }

    // 🚨 修正: スマホでも確実に保存できるプレビュー方式
    function exportImageModal() {
        const dataUrl = viewer.pngURI(); // その瞬間の画像を生成
        
        // モーダル画面の作成
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0'; modal.style.left = '0'; modal.style.width = '100%'; modal.style.height = '100%';
        modal.style.backgroundColor = 'rgba(0,0,0,0.85)';
        modal.style.zIndex = '9999';
        modal.style.display = 'flex'; modal.style.justifyContent = 'center'; modal.style.alignItems = 'center';
        modal.style.padding = '20px';

        modal.innerHTML = `
            <div style="background:#fff; padding:20px; border-radius:8px; max-width:600px; width:100%; text-align:center;">
                <h3 style="margin-top:0; color:#2c3e50;">📸 画像の保存</h3>
                <p style="font-size:13px; color:#34495e; line-height:1.5;">
                    📱 スマホ・タブレットの場合：下の画像を<b>長押し</b>して「写真に追加」や「画像を保存」を選んでください。<br>
                    💻 PCの場合：右クリックして保存するか、<a href="${dataUrl}" download="protein_structure.png" style="color:#3498db; font-weight:bold;">こちらをクリック</a>して保存してください。
                </p>
                <img src="${dataUrl}" style="width:100%; border:1px solid #bdc3c7; border-radius:4px; margin-bottom:15px;">
                <button onclick="document.body.removeChild(this.parentNode.parentNode)" style="padding:10px 20px; background:#e74c3c; color:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:14px;">閉じる</button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    function syncWithAlignment() {
        const syncData = localStorage.getItem('bio_edu_suite_mutations');
        if(syncData) {
            document.getElementById('residueList').value = syncData;
            highlightResidues();
        } else alert("同期データがありません。");
    }
</script>
</body>
</html>
