<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermal Cycler Simulator | Bio-Edu Suite</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f3f4; color: #2c3e50; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .header-container { width: 100%; background: #1a252f; border-bottom: 4px solid #1abc9c; display: flex; justify-content: center; z-index: 10; }
        .header { width: 100%; max-width: 1000px; padding: 15px 20px; color: white; display: flex; flex-direction: column; position: relative; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 700; color: #fff; }
        .header p { margin: 5px 0 0 0; font-size: 12px; color: #1abc9c; }
        .main-content { width: 100%; max-width: 1000px; padding: 20px; margin: 0 auto; flex: 1; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border-top: 4px solid #e67e22; margin-bottom: 20px; }
        .card-header { background: #34495e; color: white; padding: 12px 20px; font-size: 16px; font-weight: bold; }
        .card-body { padding: 20px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { background: #fdfefe; border: 1px solid #bdc3c7; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn:hover { background: #eaf2f8; }
        .btn-run { background: #e74c3c; color: white; border-color: #c0392b; width: 100%; padding: 12px; font-size: 16px; }
        
        /* 🚨重要：絶対に崩さないための横スクロール設定 */
        .cycler-outer { width: 100%; overflow-x: auto; border: 4px solid #2c3e50; border-radius: 8px; }
        .cycler-screen { background: #1a252f; padding: 20px; color: #ecf0f1; width: 800px; min-width: 800px; }
        
        .profile-container { display: flex; align-items: flex-end; justify-content: space-around; height: 240px; margin-top: 30px; padding-bottom: 40px; border-bottom: 2px dashed #34495e; position: relative; }
        .step { display: flex; flex-direction: column; align-items: center; width: 80px; position: relative; }
        .step-bar { width: 40px; background: #3498db; border-radius: 4px 4px 0 0; transition: height 0.3s; position: relative; }
        .temp-input-wrap, .time-input-wrap { position: absolute; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 4px; display: flex; gap: 2px; }
        .temp-input-wrap { top: -35px; } .time-input-wrap { bottom: -35px; }
        .cycler-input { width: 40px; background: transparent; border: none; border-bottom: 1px solid #1abc9c; color: #1abc9c; font-weight: bold; text-align: center; }
        .step-name { position: absolute; bottom: -60px; font-size: 10px; color: #95a5a6; font-weight: bold; text-align: center; width: 100px; }
        .cycle-bracket { position: absolute; border: 2px solid #e67e22; border-top: none; height: 15px; bottom: 5px; left: 20%; right: 40%; display: flex; justify-content: center; }
        .cycle-input-wrap { background: #1a252f; color: #e67e22; font-weight: bold; transform: translateY(10px); display: flex; gap: 5px; }
        .status-panel { display: flex; justify-content: space-between; margin-top: 30px; font-family: monospace; color: #1abc9c; background: #000; padding: 10px; }
        .hot { background: #e74c3c !important; } .cold { background: #3498db !important; } .warm { background: #f1c40f !important; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; max-width: 500px; width: 100%; }
        .footer { background: #1a252f; color: #7f8c8d; text-align: center; padding: 15px; font-size: 11px; margin-top: auto; }
    </style>
</head>
<body>
<div class="header-container"><div class="header"><h1>🔥 Thermal Cycler Simulator</h1><p>Bio-Edu Suite | Logical Troubleshooting</p></div></div>
<div class="main-content">
    <div class="card">
        <div class="card-header">⚙️ プロトコル設定</div>
        <div class="card-body">
            <div class="toolbar">
                <button class="btn" onclick="preset('standard')">標準</button>
                <button class="btn" onclick="preset('fast')">高速</button>
                <button class="btn" onclick="preset('touchdown')">Touchdown</button>
            </div>
            <div class="cycler-outer">
                <div class="cycler-screen">
                    <div class="profile-container">
                        <div class="step"><div class="temp-input-wrap"><input type="number" id="t_id" class="cycler-input" value="95" oninput="update()">℃</div><div class="step-bar" id="bar_id"></div><div class="time-input-wrap"><input type="number" id="time_id" class="cycler-input" value="120" oninput="update()">s</div><div class="step-name">Initial Denature</div></div>
                        <div class="step"><div class="temp-input-wrap"><input type="number" id="t_den" class="cycler-input" value="98" oninput="update()">℃</div><div class="step-bar" id="bar_den"></div><div class="time-input-wrap"><input type="number" id="time_den" class="cycler-input" value="10" oninput="update()">s</div><div class="step-name">Denature</div></div>
                        <div class="step"><div class="temp-input-wrap"><input type="number" id="t_ann" class="cycler-input" value="55" oninput="update()">℃</div><div class="step-bar" id="bar_ann"></div><div class="time-input-wrap"><input type="number" id="time_ann" class="cycler-input" value="30" oninput="update()">s</div><div class="step-name">Annealing</div></div>
                        <div class="step"><div class="temp-input-wrap"><input type="number" id="t_ext" class="cycler-input" value="72" oninput="update()">℃</div><div class="step-bar" id="bar_ext"></div><div class="time-input-wrap"><input type="number" id="time_ext" class="cycler-input" value="60" oninput="update()">s</div><div class="step-name">Extension</div></div>
                        <div class="step"><div class="temp-input-wrap"><input type="number" id="t_fin" class="cycler-input" value="72" oninput="update()">℃</div><div class="step-bar" id="bar_fin"></div><div class="time-input-wrap"><input type="number" id="time_fin" class="cycler-input" value="300" oninput="update()">s</div><div class="step-name">Final Extend</div></div>
                        <div class="step"><div class="temp-input-wrap"><input type="number" id="t_hld" class="cycler-input" value="4" readonly>℃</div><div class="step-bar" id="bar_hld" style="height:10%;"></div><div class="time-input-wrap"><input type="text" value="∞" class="cycler-input" readonly></div><div class="step-name">Hold</div></div>
                        <div class="cycle-bracket"><div class="cycle-input-wrap">Cycles: <input type="number" id="cycles" class="cycler-input" value="30" oninput="update()">x</div></div>
                    </div>
                    <div class="status-panel"><span id="estTime">Time: --:--:--</span><span>READY</span></div>
                </div>
            </div>
            <button class="btn btn-run" style="margin-top:20px;" onclick="run()">▶ PCRを実行して結果を判定 (RUN)</button>
        </div>
    </div>
</div>
<div class="modal" id="modal"><div class="modal-content"><div id="msg"></div><button class="btn" onclick="document.getElementById('modal').style.display='none'">閉じる</button></div></div>
<div class="footer">&copy; 2026 Bio-Edu Suite</div>
<script>
    function update() {
        ['id', 'den', 'ann', 'ext', 'fin'].forEach(s => {
            const t = parseInt(document.getElementById(`t_${s}`).value);
            const bar = document.getElementById(`bar_${s}`);
            bar.style.height = (t / 100 * 100) + '%';
            bar.className = 'step-bar ' + (t >= 90 ? 'hot' : (t >= 65 ? 'warm' : 'cold'));
        });
        const total = (parseInt(document.getElementById('time_den').value)+parseInt(document.getElementById('time_ann').value)+parseInt(document.getElementById('time_ext').value)+15) * parseInt(document.getElementById('cycles').value);
        const h = Math.floor(total/3600); const m = Math.floor((total%3600)/60);
        document.getElementById('estTime').innerText = `Time: ${h}:${m.toString().padStart(2,'0')}:${(total%60).toString().padStart(2,'0')}`;
    }
    function preset(m){
        if(m==='standard'){ v(95,120,95,30,55,30,72,60,72,300,30); }
        else if(m==='fast'){ v(98,10,98,10,60,5,68,15,68,60,30); }
        update();
    }
    function v(a,b,c,d,e,f,g,h,i,j,k){ document.getElementById('t_id').value=a;document.getElementById('time_id').value=b;document.getElementById('t_den').value=c;document.getElementById('time_den').value=d;document.getElementById('t_ann').value=e;document.getElementById('time_ann').value=f;document.getElementById('t_ext').value=g;document.getElementById('time_ext').value=h;document.getElementById('t_fin').value=i;document.getElementById('time_fin').value=j;document.getElementById('cycles').value=k;}
    function run(){ document.getElementById('modal').style.display='flex'; document.getElementById('msg').innerHTML="🎉 PCR成功！(この設定は論理的です)"; }
    window.onload = update;
</script>
</body>
</html>
